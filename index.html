<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Muttahir Islam | Portfolio</title>

    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <script>
      // Dynamically generate a rounded favicon from the GitHub avatar
      (function () {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = function () {
          const size = 64;
          const c = document.createElement('canvas');
          c.width = c.height = size;
          const ctx = c.getContext('2d');
          const r = size * 0.22; // corner radius
          ctx.beginPath();
          ctx.moveTo(r, 0);
          ctx.lineTo(size - r, 0);
          ctx.quadraticCurveTo(size, 0, size, r);
          ctx.lineTo(size, size - r);
          ctx.quadraticCurveTo(size, size, size - r, size);
          ctx.lineTo(r, size);
          ctx.quadraticCurveTo(0, size, 0, size - r);
          ctx.lineTo(0, r);
          ctx.quadraticCurveTo(0, 0, r, 0);
          ctx.closePath();
          ctx.clip();
          ctx.drawImage(img, 0, 0, size, size);
          const link = document.createElement('link');
          link.rel = 'icon';
          link.type = 'image/png';
          link.href = c.toDataURL('image/png');
          document.head.appendChild(link);
        };
        img.onerror = function () {
          // fallback plain favicon
          const link = document.createElement('link');
          link.rel = 'icon';
          link.href = 'https://avatars.githubusercontent.com/keepcodingmuttahir';
          document.head.appendChild(link);
        };
        img.src = 'https://avatars.githubusercontent.com/keepcodingmuttahir?size=64';
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
